[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "console_elk_logger_handlers"
version = "0.0.1"
dependencies = []
requires-python = ">=3.9"
authors = [
  { name="Efi Butovski", email="efibutov@gmail.com" },
]
readme = "README.md"


